<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Mobile-only top bar with a hamburger to reveal the sidebar -->
  <header class="mobile-bar">
    <button id="sidebarToggle" class="icon-btn" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <span class="mobile-title">Memory Chat</span>
  </header>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo-dot"></span>
        <span class="brand">Memory Chat</span>
      </div>

      <button id="newChatBtn" class="new-chat-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New chat
      </button>

      <div class="session-list-label">Your conversations</div>
      <nav id="sessionList" class="session-list">
        <!-- session items injected by script.js -->
      </nav>

      <div class="sidebar-footer">
        <span id="userIdBadge" class="user-id-badge" title="Your local identity, stored only in this browser">–</span>
      </div>
    </aside>

    <!-- Chat area -->
    <main class="chat-main">
      <div class="chat-scroll" id="chatScroll">
        <div class="empty-state" id="emptyState">
          <div class="empty-glyph">✦</div>
          <h1>Start a new conversation</h1>
          <p>Each chat remembers only what happens inside it. Ask something, then open a new chat and ask again — it won't recall this one.</p>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <div class="composer-wrap">
        <form id="composerForm" class="composer">
          <textarea
            id="messageInput"
            class="composer-input"
            placeholder="Message Memory Chat…"
            rows="1"
            autocomplete="off"
          ></textarea>
          <button type="submit" id="sendBtn" class="send-btn" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>
        <p class="composer-hint">Enter to send · Shift+Enter for a new line</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
